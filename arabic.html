async function askClaude(system, messages, maxTokens = 1200) {
  const res = await fetch("/.netlify/functions/claude", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ system, messages, max_tokens: maxTokens }),
  });
  let data = null;
  try { data = await res.json(); } catch {}
  if (!res.ok || !data || data.type === "error" || data.error) {
    const detail = data
      ? (typeof data.error === "string" ? data.error : (data.error && data.error.message) || "unknown error")
      : "HTTP " + res.status;
    throw new Error(detail);
  }
  return (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n");
}

/* ---- audio: text-to-speech + pronunciation check ---- */
const stripHarakat = (s) => (s || "").replace(/[\u064B-\u0652\u0670\u0640]/g, "").replace(/[أإآ]/g, "ا").replace(/ى/g, "ي").replace(/ة/g, "ه").replace(/\s+/g, " ").trim();

let AR_VOICE = null;
let VOICES_LOADED = false;
let PREF_VOICE_NAME = null;
function loadVoices() {
  try {
    const vs = window.speechSynthesis.getVoices() || [];
    if (vs.length > 0) VOICES_LOADED = true;
    AR_VOICE = (PREF_VOICE_NAME && vs.find((x) => x.name === PREF_VOICE_NAME))
      || vs.find((x) => x.lang && x.lang.toLowerCase().startsWith("ar"))
      || vs.find((x) => (x.name || "").toLowerCase().includes("arabic"))
      || null;
  } catch {}
}

function speakAr(text, rate = 0.85, on = () => {}) {
  const synth = window.speechSynthesis;
  if (!synth) { on("error"); return; }
  loadVoices();
  if (VOICES_LOADED && !AR_VOICE) { on("novoice"); return; }
  let started = false;
  const u = new SpeechSynthesisUtterance(text);
  if (AR_VOICE) u.voice = AR_VOICE;
  u.lang = (AR_VOICE && AR_VOICE.lang) || "ar-SA";
  u.rate = rate;
  u.onstart = () => { started = true; on("start"); };
  u.onend = () => on("end");
  u.onerror = () => { if (!started) on("error"); else on("end"); };

  // Chrome jams if speak() follows cancel() immediately — clear, wait a beat, then speak
  synth.cancel();
  let tries = 0;
  const attempt = () => {
    tries++;
    if ((synth.speaking || synth.pending) && tries < 6) { synth.cancel(); setTimeout(attempt, 130); return; }
    try { synth.resume(); synth.speak(u); synth.resume(); } catch { on("error"); return; }
    setTimeout(() => { if (!started && !synth.speaking && !synth.pending) on("error"); }, 2500);
  };
  setTimeout(attempt, 170);
}

function SpeakBtn({ text, dark, size = 17, slow }) {
  const [st, setSt] = useState("idle"); // idle | busy | fail | novoice
  const click = (e) => {
    e.stopPropagation();
    if (st === "busy") {
      try { window.speechSynthesis.cancel(); } catch {}
      setSt("idle");
      return;
    }
    setSt("busy");
    speakAr(text, slow ? 0.65 : 0.85, (ev) => {
      if (ev === "start") setSt("busy");
      if (ev === "end") setSt("idle");
      if (ev === "error") { setSt("fail"); setTimeout(() => setSt((s) => (s === "fail" ? "idle" : s)), 3000); }
      if (ev === "novoice") { setSt("novoice"); setTimeout(() => setSt((s) => (s === "novoice" ? "idle" : s)), 6000); }
    });
  };
  const titles = {
    idle: "Listen", busy: "Tap to stop",
    fail: "Audio didn't start — tap again",
    novoice: "No Arabic voice on this device. Mac: System Settings → Accessibility → Spoken Content → System Voice → Manage Voices → download Arabic. Windows: Settings → Time & Language → Speech → Add voices. Phones usually have it built in.",
  };
  return (
    <button onClick={click} title={titles[st]} style={{ background: "none", border: "none", cursor: "pointer", fontSize: size, padding: "0 4px", lineHeight: 1, filter: dark ? "none" : "saturate(.8)" }}>
      {st === "novoice" || st === "fail" ? "🔇" : st === "busy" ? "⏹️" : "🔊"}
    </button>
  );
}

function PronounceCheck({ target }) {
  const [st, setSt] = useState(null); // null | "listening" | "unsupported" | {ok, heard}
  const start = (e) => {
    e.stopPropagation();
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setSt("unsupported"); return; }
    try {
      const r = new SR();
      r.lang = "ar-SA"; r.interimResults = false; r.maxAlternatives = 5;
      setSt("listening");
      r.onresult = (ev) => {
        const alts = Array.from(ev.results[0]).map((a) => stripHarakat(a.transcript));
        const t = stripHarakat(target);
        const ok = alts.some((a) => a.includes(t) || t.includes(a));
        setSt({ ok, heard: ev.results[0][0].transcript });
      };
      r.onerror = () => setSt("unsupported");
      r.onend = () => setSt((s) => (s === "listening" ? null : s));
      r.start();
    } catch { setSt("unsupported"); }
  };
  return (
    <div onClick={(e) => e.stopPropagation()} style={{ borderTop: `1px dashed ${T.cardLine}`, paddingTop: 10 }}>
      {st === null && (
        <button onClick={start} style={{ background: "#EAE2CF", border: `1px solid ${T.cardLine}`, color: T.ink, borderRadius: 10, padding: "9px 14px", fontSize: 13.5, fontWeight: 600, cursor: "pointer", width: "100%" }}>🎤 Say it out loud — check my pronunciation</button>
      )}
      {st === "listening" && (
        <div style={{ textAlign: "center", color: T.goldDark, fontSize: 14, fontWeight: 600, padding: "6px 0" }}>🎤 Listening… <span className="ar" style={{ fontSize: 16 }}>{target}</span></div>
      )}
      {st === "unsupported" && (
        <div style={{ color: T.inkSoft, fontSize: 12.5, lineHeight: 1.6 }}>Mic check isn't available in this browser — use the keyboard-dictation trick instead: open any notes app, tap the mic, and say the word. If it types the right word, your pronunciation is clear.</div>
      )}
      {st && st.heard !== undefined && (
        <div style={{ fontSize: 13.5, lineHeight: 1.6 }}>
          {st.ok
            ? <span style={{ color: "#3E7A5C", fontWeight: 700 }}>✓ Clear — I heard «<span className="ar">{st.heard}</span>»</span>
            : <span style={{ color: T.goldDark, fontWeight: 600 }}>I heard «<span className="ar">{st.heard}</span>» — listen again 🔊 and try slower</span>}
          <button onClick={start} style={{ background: "none", border: "none", color: T.inkSoft, fontSize: 12.5, cursor: "pointer", textDecoration: "underline", marginRight: 8, padding: 0, display: "block", marginTop: 4 }}>Try again</button>
        </div>
      )}
    </div>
  );
}

/* ================= REVIEW SESSION ================= */
function ReviewSession({ state, setState, mode, onDone }) {
  const [queue, setQueue] = useState(() => {
    if (mode === "learn") {
      const today = dayStr();
      const already = state.learnedToday.day === today ? state.learnedToday.ids.length : 0;
      return newCards(state).slice(0, Math.max(0, NEW_PER_DAY - already));
    }
    return shuffle(dueCards(state));
  });
  const [done, setDone] = useState(0);

  if (queue.length === 0) {
    return (
      <div className="fade-in text-center" style={{ padding: "48px 20px" }}>
        <div style={{ fontSize: 44 }}>{done > 0 ? "🌟" : "✅"}</div>
        <div style={{ fontSize: 20, fontWeight: 700, color: T.text, marginTop: 12 }}>{done > 0 ? `${done} card${done > 1 ? "s" : ""} done` : mode === "learn" ? "No new cards left for today" : "Nothing due right now"}</div>
        <div style={{ color: T.soft, fontSize: 14, marginTop: 6 }}>{mode === "learn" ? "Come back tomorrow for 5 more, or add your own words." : "Reviews come back as words start to fade — that's the science."}</div>
        <div className="mt-6"><Btn onClick={onDone} kind="ghost">Back</Btn></div>
      </div>
    );
  }

  const card = queue[0];
  const grade = (g) => {
    const today = dayStr();
    const s = { ...state, srs: { ...state.srs }, learnedToday: { ...state.learnedToday } };
    const cur = s.srs[card.id] || { box: 0 };
    let box = cur.box;
    if (mode === "learn") box = 1;
    else if (g === "again") box = 0;
    else if (g === "good") box = Math.min(box + 1, INTERVALS.length - 1);
    else box = Math.min(box + 2, INTERVALS.length - 1);
    const due = new Date(); due.setDate(due.getDate() + INTERVALS[box]);
    s.srs[card.id] = { box, due: dayStr(due) };
    if (mode === "learn") {
      if (s.learnedToday.day !== today) s.learnedToday = { day: today, ids: [] };
      s.learnedToday.ids = [...s.learnedToday.ids, card.id];
    }
    s.reviewsDone = (s.reviewsDone || 0) + 1;
    if (s.streak.last !== today) {
      const y = new Date(); y.setDate(y.getDate() - 1);
      s.streak = { last: today, count: s.streak.last === dayStr(y) ? s.streak.count + 1 : 1 };
    }
    setState(s); saveState(s);
    setQueue(g === "again" && mode !== "learn" ? [...queue.slice(1), card] : queue.slice(1));
    setDone(done + 1);
  };

  return (
    <div>
      <div className="flex items-center justify-between mb-3">
        <BackBtn onClick={onDone} />
        <span style={{ color: T.soft, fontSize: 13 }}>{queue.length} left</span>
      </div>
      <Flashcard card={card} onGrade={grade} learnMode={mode === "learn"} mine={mineFor(state, card)} />
    </div>
  );
}

function AddWord({ state, setState, onBack }) {
  const [word, setWord] = useState("");
  const [hint, setHint] = useState("");
  const [busy, setBusy] = useState(false);
  const [preview, setPreview] = useState(null);
  const [err, setErr] = useState(null);

  const generate = async () => {
    if (!word.trim() || busy) return;
    setBusy(true); setErr(null); setPreview(null);
    try {
      const text = await askClaude(
        `You are an Arabic lexicographer creating a flashcard for a UAE national professional in AI/tech learning MSA + Emirati dialect. Return ONLY valid JSON, no markdown fences, no commentary, with exactly these keys:
{"ar":"the word in MSA Arabic with harakat on ambiguous letters","tr":"academic transliteration","root":"trilateral root as space-separated letters like س و ق, or — if none/loanword","en":"concise English meaning","note":"one short usage/conjugation note (Arabic+English mix ok, e.g. plural form, verb forms, related words)","em":"the Emirati dialect equivalent word (same word if identical)","emTr":"Emirati transliteration","exM":"one natural MSA example sentence, professional/tech context where possible","exE":"one natural Emirati dialect example sentence","exEn":"English translation of the Emirati example","topic":"one of: AI, Tech, Work, Presenting, Economy, Verbs, General"}`,
        [{ role: "user", content: `Word: ${word}${hint ? `\nUser's note about it: ${hint}` : ""}` }]
      );
      const c = parseJSON(text);
      setPreview({ ...c, id: "u" + Date.now(), src: "notes", custom: true });
    } catch (e) { setErr("Couldn't generate the card: " + (e.message || "try again")); }
    setBusy(false);
  };

  const save = () => {
    const s = { ...state, customCards: [...(state.customCards || []), preview] };
    setState(s); saveState(s);
    setPreview(null); setWord(""); setHint("");
  };

  return (
    <div className="fade-in flex flex-col gap-3">
      <BackBtn onClick={onBack} />
      <div style={{ color: T.text, fontSize: 18, fontWeight: 700 }}>Add a word you came across</div>
      <div style={{ color: T.soft, fontSize: 13.5, lineHeight: 1.6 }}>Heard it in a meeting, a podcast, or a headline? Type it and the coach builds the full card — root, pronunciation, Emirati form, examples — and drops it into your rotation as the next new card.</div>
      <input value={word} onChange={(e) => setWord(e.target.value)} placeholder="اكتب الكلمة… e.g. استدامة" className="ar" style={inputStyle} />
      <input value={hint} onChange={(e) => setHint(e.target.value)} placeholder="Optional: where you heard it / what you think it means" className="ltr" style={{ ...inputStyle, direction: "ltr", fontSize: 13.5 }} />
      <Btn full onClick={generate} disabled={busy || !word.trim()}>{busy ? "Building the card…" : "Generate card"}</Btn>
      {err && <div style={{ color: T.red, fontSize: 13 }}>{err}</div>}
      {preview && (
        <div className="fade-in flex flex-col gap-3">
          <Flashcard card={preview} onGrade={() => {}} learnMode={false} />
          <div className="flex gap-2">
            <Btn full kind="green" onClick={save}>Save & add to rotation</Btn>
            <Btn kind="ghost" onClick={generate}>Redo</Btn>
          </div>
        </div>
      )}
      {(state.customCards || []).length > 0 && !preview && (
        <div style={{ marginTop: 8 }}>
          <div style={{ color: T.soft, fontSize: 12, letterSpacing: 1, fontWeight: 700 }}>MY WORDS · {state.customCards.length}</div>
          <div className="flex flex-wrap gap-2 mt-2">
            {state.customCards.map((c) => (
              <span key={c.id} className="ar" style={{ background: T.surface, border: `1px solid ${T.line}`, color: T.text, borderRadius: 20, padding: "5px 13px", fontSize: 14 }}>{c.ar}</span>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ================= VOCAB QUIZ ================= */
function Quiz({ state, onBack }) {
  const [qs, setQs] = useState(null);
  const [i, setI] = useState(0);
  const [picked, setPicked] = useState(null);
  const [score, setScore] = useState(0);
  const cards = allCards(state);

  const start = (dir) => {
    const pool = shuffle(cards).slice(0, 8);
    setQs(pool.map((c) => {
      const wrong = shuffle(cards.filter((x) => x.id !== c.id)).slice(0, 3);
      return { card: c, opts: shuffle([c, ...wrong]), dir };
    }));
    setI(0); setScore(0); setPicked(null);
  };

  if (!qs) return (
    <div className="fade-in flex flex-col gap-3">
      <BackBtn onClick={onBack} />
      <div style={{ color: T.text, fontSize: 18, fontWeight: 700 }}>Vocabulary quiz</div>
      <div style={{ color: T.soft, fontSize: 14, lineHeight: 1.6 }}>Active recall under light pressure — the closest thing to being asked on the spot.</div>
      <Btn full onClick={() => start("ar2en")}><span className="ar" style={{ fontSize: 16 }}>عربي</span> → English &nbsp;·&nbsp; recognize</Btn>
      <Btn full kind="dark" onClick={() => start("en2ar")}>English → <span className="ar" style={{ fontSize: 16 }}>عربي</span> &nbsp;·&nbsp; produce (harder)</Btn>
    </div>
  );

  if (i >= qs.length) return (
    <div className="fade-in text-center" style={{ padding: "40px 16px" }}>
      <div style={{ fontSize: 44 }}>{score >= 6 ? "🏆" : "📚"}</div>
      <div style={{ color: T.text, fontSize: 22, fontWeight: 700, marginTop: 10 }}>{score} / {qs.length}</div>
      <div style={{ color: T.soft, fontSize: 14, marginTop: 6 }}>{score >= 6 ? "Strong — ماشاءالله!" : "The ones you missed will show up again in reviews."}</div>
      <div className="flex gap-2 justify-center mt-6">
        <Btn onClick={() => setQs(null)}>Again</Btn>
        <Btn kind="ghost" onClick={onBack}>Done</Btn>
      </div>
    </div>
  );

  const q = qs[i];
  const prompt = q.dir === "ar2en" ? q.card.ar : q.card.en;
  const pick = (o) => { if (picked) return; setPicked(o.id); if (o.id === q.card.id) setScore(score + 1); };

  return (
    <div className="fade-in">
      <div className="flex justify-between mb-3" style={{ color: T.soft, fontSize: 13 }}>
        <span>Question {i + 1} / {qs.length}</span><span>{score} correct</span>
      </div>
      <div style={{ background: T.card, borderRadius: 16, padding: "26px 16px", textAlign: "center", marginBottom: 14 }}>
        <div className={q.dir === "ar2en" ? "ar-display" : "ltr"} style={{ fontSize: q.dir === "ar2en" ? 38 : 24, fontWeight: q.dir === "ar2en" ? 400 : 700, color: T.ink }}>{prompt}</div>
        {q.dir === "ar2en" && <div className="ltr" style={{ color: T.inkSoft, fontSize: 14, fontStyle: "italic", marginTop: 4 }}>{q.card.tr}</div>}
      </div>
      <div className="flex flex-col gap-2">
        {q.opts.map((o) => {
          let bg = T.surface, bd = T.line;
          if (picked) {
            if (o.id === q.card.id) { bg = "#1F3A2E"; bd = T.green; }
            else if (o.id === picked) { bg = "#3A211E"; bd = T.red; }
          }
          return (
            <button key={o.id} onClick={() => pick(o)} className={q.dir === "en2ar" ? "ar" : "ltr"} style={{ background: bg, border: `1.5px solid ${bd}`, color: T.text, borderRadius: 12, padding: "13px 14px", fontSize: q.dir === "en2ar" ? 18 : 15, textAlign: q.dir === "en2ar" ? "right" : "left", cursor: "pointer" }}>{q.dir === "ar2en" ? o.en : o.ar}</button>
          );
        })}
      </div>
      {picked && (
        <div className="mt-4">
          {picked !== q.card.id && <div className="ar" style={{ color: T.soft, fontSize: 13.5, marginBottom: 10, lineHeight: 1.8 }}>{q.card.exE}</div>}
          <Btn full onClick={() => { setI(i + 1); setPicked(null); }}>{i + 1 === qs.length ? "See score" : "Next"}</Btn>
        </div>
      )}
    </div>
  );
}

function Writing({ state, setState, onBack }) {
  const [text, setText] = useState("");
  const [busy, setBusy] = useState(false);
  const [fb, setFb] = useState(null);
  const [err, setErr] = useState(null);
  const [showLog, setShowLog] = useState(false);
  const [promptWord, setPromptWord] = useState(null);

  const learnedPool = allCards(state).filter((c) => state.srs[c.id]);
  const suggestions = shuffle(learnedPool.length >= 3 ? learnedPool : allCards(state)).slice(0, 3);

  const check = async () => {
    if (!text.trim() || busy) return;
    setBusy(true); setErr(null); setFb(null);
    try {
      const raw = await askClaude(
        `You are an expert Arabic writing coach for Maryam, a UAE professional in AI. She writes sentences in Arabic (MSA or Emirati). Analyze her writing and return ONLY valid JSON, no fences:
{"corrected":"her text fully corrected in MSA with proper grammar","issues":[{"type":"short Arabic grammar label e.g. الإضافة, الصفة, تصريف الفعل, النفي, أسلوب, إملاء","fix":"1-line English explanation of the mistake and the rule, quoting her words"}],"emirati":"how she would say the corrected version naturally in Emirati dialect","upgrade":"one more polished/professional MSA version suitable for a presentation","praise":"one short specific thing she did well (English)"}
If her writing is already correct, issues should be an empty array and corrected equals her text. Max 4 issues, most important first. Refer to her grammar lessons: idafa (المضاف لا يأخذ ال), adjective agreement (non-human plural takes feminine singular), negation words, sentence types.`,
        [{ role: "user", content: (promptWord ? `Target word she was asked to use: ${promptWord}\n` : "") + "Her writing:\n" + text }]
      );
      const parsed = parseJSON(raw);
      setFb(parsed);
      if (parsed.issues && parsed.issues.length > 0) {
        const entry = { d: dayStr(), orig: text.trim(), corrected: parsed.corrected, lessons: parsed.issues.map((x) => x.type).join(" · ") };
        const s = { ...state, mistakes: [entry, ...(state.mistakes || [])].slice(0, 60) };
        setState(s); saveState(s);

  return (

async function nbApi(body) {
  const r = await fetch("/.netlify/functions/notebook", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  let d = null;
  try { d = await r.json(); } catch {}
  if (!r.ok || !d || d.error) throw new Error((d && d.error) || "HTTP " + r.status);
  return d;
}

function Notebook({ state, setState, onBack }) {
  const nb = state.notebook || { id: null, ownerKey: null, teacherKey: null, entries: [] };
  const [entries, setEntries] = useState(nb.entries || []);
  const [word, setWord] = useState("");
  const [text, setText] = useState("");
  const [status, setStatus] = useState("");
  const [busy, setBusy] = useState(false);
  const [copied, setCopied] = useState(false);

  const cards = allCards(state);
  const wordOptions = [...cards.filter((c) => c.custom), ...cards.filter((c) => !c.custom)];

  const persist = (next, extra) => {
    const s = { ...state, notebook: { ...nb, ...(extra || {}), entries: next } };
    // file any newly corrected sentence into the corrections log too
    const known = new Set((s.mistakes || []).map((m) => m.src).filter(Boolean));
    const fresh = next
      .filter((e) => e.teacherNote && !known.has(e.id))
      .map((e) => ({
        d: dayStr(new Date(e.teacherAt || Date.now())),
        orig: e.text,
        corrected: e.teacherNote,
        lessons: "تصحيح الأستاذ",
        src: e.id,
      }));
    if (fresh.length) s.mistakes = [...fresh, ...(s.mistakes || [])].slice(0, 60);
    setState(s); saveState(s);
  };

  // pull the latest from the server on open (picks up teacher comments)
  useEffect(() => {
    if (!nb.id || !nb.ownerKey) return;
    nbApi({ action: "get", id: nb.id, key: nb.ownerKey })
      .then((d) => { setEntries(d.entries || []); persist(d.entries || []); })
      .catch(() => {});
  }, []);

  const add = () => {
    if (!text.trim()) return;
    const e = { id: "s" + Date.now(), word: word || "—", text: text.trim(), updated: Date.now() };
    const next = [e, ...entries];
    setEntries(next); persist(next); setText("");
    if (nb.id) sync(next);
  };

  const edit = (id, v) => {
    const next = entries.map((e) => (e.id === id ? { ...e, text: v, updated: Date.now() } : e));
    setEntries(next); persist(next);
  };

  const remove = (id) => {
    const next = entries.filter((e) => e.id !== id);
    setEntries(next); persist(next);
    if (nb.id) sync(next);
  };

  const sync = async (list) => {
    if (!nb.id) return;
    setBusy(true); setStatus("Saving…");
    try {
      const d = await nbApi({ action: "save", id: nb.id, key: nb.ownerKey, entries: list || entries });
      setEntries(d.entries || []); persist(d.entries || []);
      setStatus("Saved · your teacher sees this now");
    } catch (e) { setStatus("Couldn't save: " + e.message); }
    setBusy(false);
  };

  const createLink = async () => {
    setBusy(true); setStatus("Creating your teacher link…");
    try {
      const d = await nbApi({ action: "create" });
      const s = { ...state, notebook: { id: d.id, ownerKey: d.ownerKey, teacherKey: d.teacherKey, entries } };
      setState(s); saveState(s);
      await nbApi({ action: "save", id: d.id, key: d.ownerKey, entries });
      setStatus("Link ready — send it to your teacher");
    } catch (e) { setStatus("Couldn't create the link: " + e.message); }
    setBusy(false);
  };

  const link = nb.id ? `${location.origin}${location.pathname}#t=${nb.id}.${nb.teacherKey}` : "";
  const copy = () => {
    try { navigator.clipboard.writeText(link); setCopied(true); setTimeout(() => setCopied(false), 2500); } catch {}
  };

  return (
    <div className="fade-in flex flex-col gap-3">
      <BackBtn onClick={onBack} />
      <div style={{ color: T.text, fontSize: 18, fontWeight: 700 }}>My sentence notebook</div>
      <div style={{ color: T.soft, fontSize: 13.5, lineHeight: 1.6 }}>Write your own sentences with the words you're learning. Edit them any time. Your teacher opens one link on his own device, reads them, and writes corrections back — they appear here.</div>

      <div style={{ background: T.surface, border: `1px solid ${T.line}`, borderRadius: 16, padding: "13px 15px" }} className="flex flex-col gap-2">
        <select value={word} onChange={(e) => setWord(e.target.value)} className="ar" style={{ ...inputStyle, fontSize: 15 }}>
          <option value="">اختاري كلمة (اختياري) · pick a word</option>
          {wordOptions.map((c) => (
            <option key={c.id} value={c.ar}>{c.ar} — {c.en}{c.custom ? " ★" : ""}</option>
          ))}
        </select>
        <textarea value={text} onChange={(e) => setText(e.target.value)} rows={3} placeholder="اكتبي جملتك هنا…" className="ar" style={{ ...inputStyle, resize: "vertical", lineHeight: 1.9 }} />
        <Btn full onClick={add} disabled={!text.trim()}>Add sentence</Btn>
      </div>

      {nb.id ? (
        <div style={{ background: T.surface2, border: `1px solid ${T.line}`, borderRadius: 14, padding: "12px 14px" }}>
          <div style={{ color: T.gold, fontSize: 11, letterSpacing: 1, fontWeight: 700 }}>TEACHER LINK</div>
          <div className="ltr" style={{ color: T.soft, fontSize: 11.5, wordBreak: "break-all", marginTop: 5, lineHeight: 1.5 }}>{link}</div>
          <div className="flex gap-2 mt-2">
            <Btn small onClick={copy}>{copied ? "Copied ✓" : "Copy link"}</Btn>
            <Btn small kind="ghost" onClick={() => sync()} disabled={busy}>Sync now</Btn>
          </div>
        </div>
      ) : (
        <Btn full kind="green" onClick={createLink} disabled={busy}>Create a link for my teacher</Btn>
      )}
      {status && <div style={{ color: status.startsWith("Couldn't") ? T.red : T.soft, fontSize: 12.5, lineHeight: 1.6 }}>{status}</div>}

      {entries.length === 0 && <div style={{ color: T.soft, fontSize: 13.5 }}>No sentences yet — write your first one above.</div>}
      {entries.map((e) => (
        <div key={e.id} style={{ background: T.surface, border: `1px solid ${T.line}`, borderRadius: 14, padding: "12px 14px" }} className="flex flex-col gap-2">
          <div className="flex items-center justify-between">
            <span style={{ color: T.soft, fontSize: 11 }}>{new Date(e.updated || Date.now()).toLocaleDateString()}</span>
            <span className="ar" style={{ color: T.gold, fontSize: 15, fontWeight: 700 }}>{e.word}</span>
          </div>
          <textarea value={e.text} onChange={(ev) => edit(e.id, ev.target.value)} onBlur={() => nb.id && sync()} rows={2} className="ar" style={{ ...inputStyle, resize: "vertical", fontSize: 16, lineHeight: 1.9 }} />
          {e.teacherNote && (
            <div style={{ background: "#1F3A2E", border: `1px solid ${T.green}55`, borderRadius: 12, padding: "10px 13px" }}>
              <div style={{ color: T.green, fontSize: 11, letterSpacing: 1, fontWeight: 700, marginBottom: 4 }}>TEACHER'S CORRECTION</div>
              <div className="ar" style={{ color: T.text, fontSize: 15.5, lineHeight: 1.9 }}>{e.teacherNote}</div>
            </div>
          )}
          <button onClick={() => remove(e.id)} style={{ background: "none", border: "none", color: T.soft, fontSize: 12, cursor: "pointer", alignSelf: "flex-start", padding: 0 }}>Delete</button>
        </div>
      ))}
    </div>
  );
}

/* ================= TEACHER VIEW (read-only + comments) ================= */
function TeacherView({ id, key0 }) {
  const [data, setData] = useState(null);
  const [err, setErr] = useState(null);
  const [drafts, setDrafts] = useState({});
  const [savingId, setSavingId] = useState(null);

  const load = () => {
    nbApi({ action: "get", id, key: key0 })
      .then((d) => setData(d))
      .catch((e) => setErr(e.message));
  };
  useEffect(load, []);

  const send = async (entryId) => {
    setSavingId(entryId);
    try {
      const d = await nbApi({ action: "comment", id, key: key0, entryId, comment: drafts[entryId] || "" });
      setData({ ...data, entries: d.entries });
      setDrafts({ ...drafts, [entryId]: undefined });
    } catch (e) { setErr(e.message); }
    setSavingId(null);
  };

  return (
    <div style={{ minHeight: "100vh", background: T.bg, fontFamily: "'IBM Plex Sans', sans-serif" }}>
      <style>{FONT_CSS}</style>
      <div style={{ maxWidth: 560, margin: "0 auto", padding: "22px 16px 60px" }} className="flex flex-col gap-3">
        <div>
          <div className="ar-display" style={{ color: T.gold, fontSize: 26 }}>دفتر مريم</div>
          <div style={{ color: T.soft, fontSize: 12.5, marginTop: 3 }}>Her practice sentences. Write a correction under any sentence and press Send — she'll see it in her app.</div>
        </div>
        {err && <div style={{ color: T.red, fontSize: 13.5 }}>{err}</div>}
        {!data && !err && <div style={{ color: T.soft, fontSize: 14 }}>Loading…</div>}
        {data && (data.entries || []).length === 0 && <div style={{ color: T.soft, fontSize: 14 }}>No sentences yet.</div>}
        {data && (data.entries || []).map((e) => (
          <div key={e.id} style={{ background: T.surface, border: `1px solid ${T.line}`, borderRadius: 16, padding: "14px 16px" }} className="flex flex-col gap-2">
            <div className="flex items-center justify-between">
              <span style={{ color: T.soft, fontSize: 11 }}>{new Date(e.updated || Date.now()).toLocaleDateString()}</span>
              <span className="ar" style={{ color: T.gold, fontSize: 15, fontWeight: 700 }}>{e.word}</span>
            </div>
            <div className="ar" style={{ color: T.text, fontSize: 17, lineHeight: 2 }}>{e.text}</div>
            {e.teacherNote && drafts[e.id] === undefined && (
              <div style={{ background: "#1F3A2E", border: `1px solid ${T.green}55`, borderRadius: 12, padding: "10px 13px" }}>
                <div style={{ color: T.green, fontSize: 11, letterSpacing: 1, fontWeight: 700, marginBottom: 4 }}>YOUR CORRECTION</div>
                <div className="ar" style={{ color: T.text, fontSize: 15.5, lineHeight: 1.9 }}>{e.teacherNote}</div>
                <button onClick={() => setDrafts({ ...drafts, [e.id]: e.teacherNote })} style={{ background: "none", border: "none", color: T.soft, fontSize: 12, cursor: "pointer", padding: "6px 0 0" }}>Edit</button>
              </div>
            )}
            {(drafts[e.id] !== undefined || !e.teacherNote) && (
              <div className="flex flex-col gap-2">
                <textarea value={drafts[e.id] || ""} onChange={(ev) => setDrafts({ ...drafts, [e.id]: ev.target.value })} rows={2} placeholder="التصحيح والملاحظة…" className="ar" style={{ ...inputStyle, resize: "vertical", lineHeight: 1.9 }} />
                <Btn small onClick={() => send(e.id)} disabled={savingId === e.id}>{savingId === e.id ? "Sending…" : "Send correction"}</Btn>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ================= VOICE PICKER ================= */
function VoicePicker({ state, setState, onBack }) {
  const [voices, setVoices] = useState([]);
  useEffect(() => {
    const upd = () => setVoices(window.speechSynthesis?.getVoices() || []);
    upd();
    try { window.speechSynthesis.onvoiceschanged = () => { loadVoices(); upd(); }; } catch {}
    const t = setTimeout(upd, 600);
    return () => clearTimeout(t);
  }, []);
  const arv = voices.filter((v) => (v.lang || "").toLowerCase().startsWith("ar") || (v.name || "").toLowerCase().includes("arab"));
  const chosen = state.ttsVoice;
  const choose = (v) => {
    PREF_VOICE_NAME = v.name;
    loadVoices();
    const s = { ...state, ttsVoice: v.name };
    setState(s); saveState(s);
    speakAr("مرحباً مريم، أنا صوتك الجديد. يالله نتدرب.", 0.85);
  };
  return (
    <div className="fade-in flex flex-col gap-3">
      <BackBtn onClick={onBack} />
      <div style={{ color: T.text, fontSize: 18, fontWeight: 700 }}>Audio & voice</div>
      <div style={{ color: T.soft, fontSize: 13, lineHeight: 1.6 }}>This browser reports <b style={{ color: T.text }}>{voices.length}</b> voices, of which <b style={{ color: T.text }}>{arv.length}</b> {arv.length === 1 ? "is" : "are"} Arabic. Tap one to select it — it plays a test line so you can judge it.</div>
      {arv.length === 0 && voices.length > 0 && (
        <div style={{ background: "#3A2A1E", border: `1px solid ${T.gold}55`, borderRadius: 14, padding: "13px 15px", color: T.text, fontSize: 13.5, lineHeight: 1.7 }}>
          No Arabic voice is installed on this device, so the browser tries to read Arabic with an English voice — that's the mumbling you heard.<br /><br />
          <b>Mac:</b> System Settings → Accessibility → Spoken Content → System Voice → Manage Voices → download Arabic (Majed), then fully quit and reopen Chrome.<br />
          <b>Windows:</b> Settings → Time & Language → Speech → Add voices → Arabic.<br />
          <b>Phone:</b> almost always has Arabic built in — try the app there.
        </div>
      )}
      {arv.length === 0 && voices.length === 0 && (
        <div style={{ background: T.surface, border: `1px solid ${T.line}`, borderRadius: 14, padding: "13px 15px", color: T.soft, fontSize: 13.5, lineHeight: 1.7 }}>
          The browser hasn't exposed any voices to this app (some embedded views block them). Try opening the artifact in a full browser tab, or use it on your phone.
        </div>
      )}
      {arv.map((v) => (
        <button key={v.name} onClick={() => choose(v)} style={{ background: chosen === v.name ? "#2A3F33" : T.surface, border: `1.5px solid ${chosen === v.name ? T.green : T.line}`, borderRadius: 14, padding: "13px 15px", textAlign: "left", cursor: "pointer" }}>
          <div className="flex items-center justify-between">
            <span style={{ color: T.text, fontSize: 14.5, fontWeight: 600 }}>{chosen === v.name ? "✓ " : ""}{v.name}</span>
            <span style={{ color: T.soft, fontSize: 12 }}>{v.lang}{v.localService === false ? " · online" : ""}</span>
          </div>
        </button>
      ))}
      {arv.length > 0 && (
        <div style={{ color: T.soft, fontSize: 12.5, lineHeight: 1.6 }}>If a voice sounds robotic, try another — quality differs a lot. Your choice is saved and used by every 🔊 in the app.</div>
      )}
    </div>
  );
}

/* ================= CARDS HUB ================= */
function CardsHub({ state, setState, forcedMode, clearForced }) {
  const [mode, setMode] = useState(forcedMode || null);
  useEffect(() => { if (forcedMode) { setMode(forcedMode); clearForced(); } }, [forcedMode]);
  const due = dueCards(state).length;
  const today = dayStr();
  const learned = state.learnedToday.day === today ? state.learnedToday.ids.length : 0;
  const newLeft = Math.min(NEW_PER_DAY - learned, newCards(state).length);

  if (mode === "review" || mode === "learn") return <ReviewSession state={state} setState={setState} mode={mode} onDone={() => setMode(null)} />;
  if (mode === "browse") return <Browse state={state} onBack={() => setMode(null)} />;
  if (mode === "add") return <AddWord state={state} setState={setState} onBack={() => setMode(null)} />;
  if (mode === "voice") return <VoicePicker state={state} setState={setState} onBack={() => setMode(null)} />;
  if (mode === "notebook") return <Notebook state={state} setState={setState} onBack={() => setMode(null)} />;
  return (
    <div className="fade-in flex flex-col gap-3">
      <div style={{ color: T.text, fontSize: 18, fontWeight: 700 }}>Flashcards</div>
      <div style={{ color: T.soft, fontSize: 13.5, lineHeight: 1.6 }}>Every card carries the word, its root, pronunciation, the Emirati form, and paired MSA + Emirati examples.</div>
      <Btn full onClick={() => setMode("review")} disabled={due === 0}>Review due · {due}</Btn>
      <Btn full kind="dark" onClick={() => setMode("learn")} disabled={newLeft === 0}>Learn new · {newLeft} left today</Btn>
      <Btn full kind="green" onClick={() => setMode("add")}>+ Add a word I came across</Btn>
      <Btn full kind="dark" onClick={() => setMode("notebook")}>📓 My sentence notebook{state.notebook && state.notebook.entries && state.notebook.entries.length ? ` · ${state.notebook.entries.length}` : ""}</Btn>
      <Btn full kind="ghost" onClick={() => setMode("browse")}>Browse all {allCards(state).length} cards</Btn>
      <button onClick={() => setMode("voice")} style={{ background: "none", border: "none", color: T.soft, fontSize: 13, cursor: "pointer", padding: "4px 0", textDecoration: "underline" }}>🔊 Audio not working? Voice settings</button>
    </div>
  );
}

/* ================= APP ================= */
function App() {
  const [state, setState] = useState(null);
  const [tab, setTab] = useState("today");
  const hash = typeof location !== "undefined" ? location.hash : "";
  const tMatch = hash.match(/^#t=([a-zA-Z0-9-]+)\.([a-zA-Z0-9]+)$/);
  const [forcedCards, setForcedCards] = useState(null);
  const [forcedPractice, setForcedPractice] = useState(null);

  useEffect(() => {
    loadState().then((s) => {
      setState(s);
      if (s.ttsVoice) PREF_VOICE_NAME = s.ttsVoice;
      loadVoices();
    });
    try { loadVoices(); window.speechSynthesis.onvoiceschanged = loadVoices; } catch {}
  }, []);

  const go = (t, mode) => {
    setTab(t);
    if (t === "cards" && mode) setForcedCards(mode);
    if (t === "practice" && mode) setForcedPractice(mode);
  };

  if (tMatch) return <TeacherView id={tMatch[1]} key0={tMatch[2]} />;

  if (!state) return (
    <div style={{ minHeight: "100vh", background: T.bg, display: "flex", alignItems: "center", justifyContent: "center" }}>
      <style>{FONT_CSS}</style>
      <div className="ar-display" style={{ color: T.gold, fontSize: 28 }}>يالله نبدأ…</div>
    </div>
  );

  const tabs = [
    { id: "today", ar: "اليوم", en: "Today" },
    { id: "cards", ar: "بطاقات", en: "Cards" },
    { id: "practice", ar: "تمارين", en: "Practice" },
    { id: "speak", ar: "تكلّم", en: "Speak" },
    { id: "phrases", ar: "عبارات", en: "Phrases" },
  ];

  return (
    <div style={{ minHeight: "100vh", background: T.bg, fontFamily: "'IBM Plex Sans', sans-serif" }}>
      <style>{FONT_CSS}</style>
      <div style={{ maxWidth: 480, margin: "0 auto", padding: "18px 16px 90px" }}>
        <div className="flex items-center justify-between mb-4">
          <div>
            <div className="ar-display" style={{ color: T.text, fontSize: 21, lineHeight: 1 }}>رَمسَتي</div>
            <div style={{ color: T.soft, fontSize: 10, letterSpacing: 2, marginTop: 3 }}>RAMSATI · MY WAY OF SPEAKING</div>
          </div>
          <div style={{ width: 34, height: 34, borderRadius: "50%", background: T.gold, color: "#221A0C", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 15 }} className="ar">م</div>
        </div>
        {tab === "today" && <Today state={state} go={go} />}
        {tab === "cards" && <CardsHub state={state} setState={setState} forcedMode={forcedCards} clearForced={() => setForcedCards(null)} />}
        {tab === "practice" && <PracticeHub state={state} setState={setState} forced={forcedPractice} clearForced={() => setForcedPractice(null)} />}
        {tab === "speak" && <Speak />}
        {tab === "phrases" && <Phrases />}
      </div>
      <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "#0C1917EE", backdropFilter: "blur(8px)", borderTop: `1px solid ${T.line}` }}>
        <div style={{ maxWidth: 480, margin: "0 auto", display: "flex" }}>
          {tabs.map((t) => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: 1, background: "none", border: "none", padding: "10px 4px 14px", cursor: "pointer" }}>
              <div className="ar" style={{ fontSize: 16, fontWeight: 700, color: tab === t.id ? T.gold : T.soft }}>{t.ar}</div>
              <div style={{ fontSize: 9, letterSpacing: 1, color: tab === t.id ? T.gold : "#5C6E66", marginTop: 1 }}>{t.en.toUpperCase()}</div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
